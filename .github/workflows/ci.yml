name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate || true

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:cov

      - name: E2E tests
        run: npm run test:e2e

      - name: Validate Python workers
        run: python3 -m py_compile agents/python/worker_common.py && python3 -m py_compile agents/python/langgraph_fraud_agent.py && python3 -m py_compile agents/python/langchain_growth_agent.py && python3 -m py_compile agents/python/crewai_compliance_agent.py
