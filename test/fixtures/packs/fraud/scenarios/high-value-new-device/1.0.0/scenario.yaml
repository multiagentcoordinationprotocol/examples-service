apiVersion: scenarios.macp.dev/v1
kind: ScenarioVersion
metadata:
  pack: fraud
  scenario: high-value-new-device
  version: 1.0.0
  name: High Value Purchase From New Device
  summary: Fraud, Growth, Compliance, and Risk agents discuss a transaction and produce a decision.
  tags: [fraud, growth, compliance, risk, demo]
spec:
  runtime:
    kind: rust
    version: v1

  inputs:
    schema:
      type: object
      properties:
        customerId:
          type: string
          default: CUST-1001
        transactionAmount:
          type: number
          default: 2400
          minimum: 1
        deviceTrustScore:
          type: number
          default: 0.18
          minimum: 0
          maximum: 1
        accountAgeDays:
          type: integer
          default: 14
          minimum: 0
        isVipCustomer:
          type: boolean
          default: true
        priorChargebacks:
          type: integer
          default: 1
          minimum: 0
      required:
        - transactionAmount
        - deviceTrustScore
        - accountAgeDays
        - isVipCustomer
        - priorChargebacks

  launch:
    modeName: macp.mode.decision.v1
    modeVersion: 1.0.0
    configurationVersion: config.default
    policyVersion: policy.default
    policyHints:
      type: none
      description: Default policy — no additional governance constraints
      vetoThreshold: 1
      minimumConfidence: 0.0
      designatedRoles: []
    ttlMs: 300000
    initiatorParticipantId: risk-agent

    participants:
      - id: fraud-agent
        role: fraud
        agentRef: fraud-agent
      - id: growth-agent
        role: growth
        agentRef: growth-agent
      - id: compliance-agent
        role: compliance
        agentRef: compliance-agent
      - id: risk-agent
        role: risk
        agentRef: risk-agent

    contextTemplate:
      customerId: "{{ inputs.customerId }}"
      transactionAmount: "{{ inputs.transactionAmount }}"
      deviceTrustScore: "{{ inputs.deviceTrustScore }}"
      accountAgeDays: "{{ inputs.accountAgeDays }}"
      isVipCustomer: "{{ inputs.isVipCustomer }}"
      priorChargebacks: "{{ inputs.priorChargebacks }}"

    metadataTemplate:
      demoType: fraud-decision
      decisionOwner: risk-agent
      specialists:
        - fraud-agent
        - growth-agent
        - compliance-agent
      intent: evaluate high value transaction from a new device

    kickoffTemplate:
      - from: risk-agent
        to: [fraud-agent, growth-agent, compliance-agent]
        kind: proposal
        messageType: Proposal
        payloadEnvelope:
          encoding: proto
          proto:
            typeName: macp.modes.decision.v1.ProposalPayload
            value:
              proposal_id: "{{ inputs.customerId }}-initial-review"
              option: evaluate_transaction
              rationale: Decide whether to approve, step_up, or decline the transaction.

  execution:
    tags: [demo, fraud, examples]
    requester:
      actorId: example-service
      actorType: service

  outputs:
    expectedDecisionKinds:
      - approve
      - step_up
      - decline
    expectedSignals:
      - suspicious_device
      - chargeback_history
      - vip_customer
      - low_device_trust
