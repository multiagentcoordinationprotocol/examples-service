- id: claim-validated
  title: Claim validated
  description: Claims validator has confirmed documentation and policy coverage for the incident.
  requiredRoles: [claims-validator]
  policyRef: policy.claims.majority
- id: compliance-reviewed
  title: Compliance review complete
  description: Compliance reviewer has confirmed the claim meets regulatory handling requirements.
